version: '3.8'

services:
  #  Database MySQL
  db:
    image: mysql:8.0
    container_name: garuda_db
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: garuda_db
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql

  #  Backend Laravel
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: garuda_backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=garuda_db
      - DB_USERNAME=root
      - DB_PASSWORD=root
    volumes:
      - ./backend:/var/www/html
    command: >
      sh -c "composer install --ignore-platform-reqs && 
             sleep 5 && 
             php artisan migrate --force && 
             php artisan serve --host=0.0.0.0 --port=8000"

  #  Frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: garuda_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  db_data:
